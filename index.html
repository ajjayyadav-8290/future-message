<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counting Down To Your Smile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    background: radial-gradient(circle at top,#111 0%,#000 70%);
    color:white;
    overflow-x:hidden;
    animation:fadeIn 1.5s ease-in-out;
}

/* NAVBAR */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
}

.logo{
    font-weight:900;
    font-size:22px;
    letter-spacing:2px;
}

nav ul{
    display:flex;
    gap:30px;
    list-style:none;
}

nav ul li{
    cursor:pointer;
    transition:0.3s;
}

nav ul li:hover{
    color:#00f5ff;
}

/* HERO */
.hero{
    text-align:center;
    margin-top:60px;
}

.main-title{
    font-size:65px;
    font-weight:900;
    line-height:1.2;
    letter-spacing:1px;
    animation: slideUp 1.5s ease forwards;
}

.gradient-text{
    background: linear-gradient(90deg,#00f5ff,#ff00ff,#ff4d4d);
    background-size:200% auto;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation: gradientMove 4s linear infinite;
}

/* TIMER */
#countdown{
    font-size:32px;
    margin-top:25px;
    font-weight:700;
    background: linear-gradient(90deg,#00f5ff,#ff00ff,#ff4d4d);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

#dynamicMessage{
    margin-top:15px;
    font-size:18px;
    color:#ccc;
    min-height:25px;
}

/* GALLERY */
.gallery{
    margin-top:80px;
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
    padding:40px;
}

.card{
    width:220px;
    height:300px;
    border-radius:20px;
    overflow:hidden;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.card:hover{
    transform:scale(1.1) rotateY(10deg);
    box-shadow:0 0 30px #ff00ff;
}

/* Upcoming */
.upcoming{
    margin-top:60px;
    text-align:center;
    font-size:22px;
    color:#aaa;
    padding-bottom:60px;
}

/* SECOND SCREEN */
#secondScreen{
    display:none;
    height:100vh;
    width:100%;
    background:black;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    font-size:45px;
}

/* Animations */
@keyframes fadeIn{
    from{opacity:0}
    to{opacity:1}
}

@keyframes slideUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes gradientMove{
    0%{background-position:0%}
    100%{background-position:200%}
}

@media(max-width:768px){
    .main-title{
        font-size:40px;
    }
}
</style>
</head>
<body>

<nav>
    <div class="logo">XNFT</div>
    <ul>
        <li>Market</li>
        <li>Gallery</li>
        <li>Wallet</li>
        <li>Support</li>
    </ul>
</nav>

<div class="hero">
    <h1 class="main-title">
        Counting Down To <br>
        <span class="gradient-text">Your Smile 💖</span>
    </h1>

    <div id="countdown"></div>
    <div id="dynamicMessage"></div>
</div>

<div class="gallery">
    <div class="card"><img src="photo1.jpg"></div>
    <div class="card"><img src="photo2.jpg"></div>
    <div class="card"><img src="photo3.jpg"></div>
    <div class="card"><img src="photo4.jpg"></div>
    <div class="card"><img src="photo5.jpg"></div>
    <div class="card"><img src="photo6.jpg"></div>
    <div class="card"><img src="photo7.jpg"></div>
    <div class="card"><img src="photo8.jpg"></div>
    <div class="card"><img src="photo9.jpg"></div>
    <div class="card"><img src="photo10.jpg"></div>
</div>

<div class="upcoming">
    Something magical is coming... <br>
    A surprise awaits you ❤️
</div>

<div id="secondScreen">
    🎉 HAPPY BIRTHDAY MY LOVE 🎉
</div>

<script>

/* COUNTDOWN */
const targetDate = new Date("March 25, 2026 00:00:00").getTime();

const countdownFunction = setInterval(function(){

    const now = new Date().getTime();
    const distance = targetDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
        days + "d " + hours + "h "
        + minutes + "m " + seconds + "s ";

    if(distance < 0){
        clearInterval(countdownFunction);
        document.querySelector(".hero").style.display = "none";
        document.querySelector(".gallery").style.display = "none";
        document.querySelector(".upcoming").style.display = "none";
        document.querySelector("nav").style.display = "none";
        document.getElementById("secondScreen").style.display = "flex";
    }

}, 1000);


/* RANDOM MESSAGE */
const messages = [
    "Every second brings me closer to celebrating YOU ❤️",
    "A surprise is loading for the most special girl 💖",
    "This countdown hides something magical ✨",
    "Your smile is worth every second of this wait 🌸",
    "25th March will be unforgettable 💕",
    "You deserve the most beautiful surprise 🌹"
];

const randomMessage = messages[Math.floor(Math.random() * messages.length)];
document.getElementById("dynamicMessage").innerText = randomMessage;

</script>

</body>
</html>
