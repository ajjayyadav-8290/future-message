<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counting Down To Your Smile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: radial-gradient(circle at top,#111 0%,#000 70%);
    color:white;
    overflow-x:hidden;
    animation:fadeIn 1.5s ease-in-out;
    position:relative;
}

/* PARTICLE CANVAS */
#particles{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
}

.logo{
    font-weight:900;
    font-size:22px;
}

/* HERO */
.hero{
    text-align:center;
    margin-top:80px;
}

.main-title{
    font-size:65px;
    font-weight:900;
    line-height:1.2;
    animation:slideUp 1.5s ease forwards;
}

.gradient-text{
    background: linear-gradient(90deg,#00f5ff,#ff00ff,#ff4d4d);
    background-size:200% auto;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:gradientMove 4s linear infinite;
}

/* HEARTBEAT TIMER */
#countdown{
    font-size:36px;
    margin-top:30px;
    font-weight:700;
    background: linear-gradient(90deg,#00f5ff,#ff00ff,#ff4d4d);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation: heartbeat 1.5s infinite;
}

/* Heartbeat animation */
@keyframes heartbeat{
    0%{transform:scale(1);}
    25%{transform:scale(1.1);}
    40%{transform:scale(1);}
    60%{transform:scale(1.15);}
    100%{transform:scale(1);}
}

#dynamicMessage{
    margin-top:15px;
    font-size:18px;
    color:#ccc;
}

/* GALLERY */
.gallery{
    margin-top:80px;
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
    padding:40px;
}

.card{
    width:220px;
    height:300px;
    border-radius:20px;
    overflow:hidden;
    transition:transform 0.4s ease, box-shadow 0.4s ease;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.card:hover{
    transform:scale(1.1) rotateY(10deg);
    box-shadow:0 0 30px #ff00ff;
}

.upcoming{
    margin-top:60px;
    text-align:center;
    font-size:22px;
    color:#aaa;
    padding-bottom:60px;
}

/* SECOND SCREEN */
#secondScreen{
    display:none;
    height:100vh;
    width:100%;
    background:black;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    font-size:45px;
}

@keyframes fadeIn{
    from{opacity:0}
    to{opacity:1}
}

@keyframes slideUp{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes gradientMove{
    0%{background-position:0%}
    100%{background-position:200%}
}

@media(max-width:768px){
    .main-title{font-size:40px;}
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<nav>
    <div class="logo">XNFT</div>
</nav>

<div class="hero">
    <h1 class="main-title">
        Counting Down To <br>
        <span class="gradient-text">Your Smile 💖</span>
    </h1>

    <div id="countdown"></div>
    <div id="dynamicMessage"></div>
</div>

<div class="gallery">
    <div class="card"><img src="photo1.jpg"></div>
    <div class="card"><img src="photo2.jpg"></div>
    <div class="card"><img src="photo3.jpg"></div>
    <div class="card"><img src="photo4.jpg"></div>
    <div class="card"><img src="photo5.jpg"></div>
    <div class="card"><img src="photo6.jpg"></div>
    <div class="card"><img src="photo7.jpg"></div>
    <div class="card"><img src="photo8.jpg"></div>
    <div class="card"><img src="photo9.jpg"></div>
    <div class="card"><img src="photo10.jpg"></div>
</div>

<div class="upcoming">
    Something magical is coming... <br>
    A surprise awaits you ❤️
</div>

<div id="secondScreen">
    🎉 HAPPY BIRTHDAY MY LOVE 🎉
</div>

<script>

/* COUNTDOWN */
const targetDate = new Date("March 25, 2026 00:00:00").getTime();

const countdownFunction = setInterval(function(){
    const now = new Date().getTime();
    const distance = targetDate - now;

    const days = Math.floor(distance/(1000*60*60*24));
    const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
    const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
    const seconds = Math.floor((distance%(1000*60))/1000);

    document.getElementById("countdown").innerHTML =
        days+"d "+hours+"h "+minutes+"m "+seconds+"s ";

    if(distance<0){
        clearInterval(countdownFunction);
        document.querySelector(".hero").style.display="none";
        document.querySelector(".gallery").style.display="none";
        document.querySelector(".upcoming").style.display="none";
        document.querySelector("nav").style.display="none";
        document.getElementById("secondScreen").style.display="flex";
    }
},1000);

/* RANDOM MESSAGE */
const messages=[
"Every second brings me closer to celebrating YOU ❤️",
"A surprise is loading for the most special girl 💖",
"This countdown hides something magical ✨",
"Your smile is worth every second of this wait 🌸",
"25th March will be unforgettable 💕",
"You deserve the most beautiful surprise 🌹"
];

document.getElementById("dynamicMessage").innerText=
messages[Math.floor(Math.random()*messages.length)];

/* FLOATING PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particlesArray=[];

class Particle{
    constructor(){
        this.x=Math.random()*canvas.width;
        this.y=Math.random()*canvas.height;
        this.size=Math.random()*2+1;
        this.speedY=Math.random()*0.5+0.2;
    }
    update(){
        this.y-=this.speedY;
        if(this.y<0) this.y=canvas.height;
    }
    draw(){
        ctx.fillStyle="rgba(255,0,255,0.5)";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

function init(){
    for(let i=0;i<120;i++){
        particlesArray.push(new Particle());
    }
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particlesArray.forEach(p=>{
        p.update();
        p.draw();
    });
    requestAnimationFrame(animate);
}

init();
animate();

</script>

</body>
</html>
