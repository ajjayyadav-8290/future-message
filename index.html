<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counting Down To Your Smile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
color:white;
overflow-x:hidden;
text-align:center;
}

/* OCEAN VIDEO */

#oceanVideo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
opacity:0.25;
z-index:-5;
}

/* FISH */

.fish{
position:fixed;
width:70px;
z-index:-2;
animation:swim 20s linear infinite;
}

.fish1{top:25%;animation-duration:18s;}
.fish2{top:55%;animation-duration:22s;}
.fish3{top:75%;animation-duration:20s;}

@keyframes swim{
from{left:-100px;}
to{left:110%;}
}

/* HERO */

.hero{
margin-top:60px;
padding:20px;
}

.main-title{
font-size:clamp(30px,6vw,65px);
font-weight:900;
line-height:1.2;
}

.gradient-text{
background:linear-gradient(90deg,#00f5ff,#ff00ff,#ff4d4d);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* COUNTDOWN */

#countdown{
font-size:clamp(22px,4vw,34px);
margin-top:20px;
font-weight:700;
}

/* ORBIT PHOTOS */

.orbit-container{
position:relative;
width:350px;
height:350px;
margin:60px auto;
}

.orbit{
position:absolute;
width:100%;
height:100%;
border-radius:50%;
animation:rotateOrbit 25s linear infinite;
}

.orbit img{
position:absolute;
width:70px;
height:70px;
border-radius:50%;
object-fit:cover;
cursor:pointer;
box-shadow:0 0 15px rgba(255,255,255,0.6);
}

.orbit img:nth-child(1){top:-30px;left:50%;transform:translateX(-50%);}
.orbit img:nth-child(2){top:20%;right:-30px;}
.orbit img:nth-child(3){bottom:-30px;left:50%;transform:translateX(-50%);}
.orbit img:nth-child(4){top:20%;left:-30px;}
.orbit img:nth-child(5){top:60%;right:-30px;}

@keyframes rotateOrbit{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* GALLERY */

.gallery{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
padding:30px;
}

.card{
width:clamp(140px,40vw,220px);
height:clamp(200px,50vw,300px);
border-radius:20px;
overflow:hidden;
transition:0.4s;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
cursor:pointer;
}

.card:hover{
transform:scale(1.1);
box-shadow:0 0 25px #ff00ff;
}

/* MEMORY POPUP */

#memoryPopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:30px;
font-size:24px;
}

#memoryPopup button{
margin-top:20px;
padding:12px 30px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}

/* BIRTHDAY SCREEN */

#secondScreen{
display:none;
height:100vh;
width:100%;
background:black;
justify-content:center;
align-items:center;
font-size:40px;
flex-direction:column;
}

/* MOBILE */

@media(max-width:768px){

.orbit-container{
width:260px;
height:260px;
}

.orbit img{
width:55px;
height:55px;
}

}

</style>
</head>

<body>

<!-- OCEAN BACKGROUND -->
<video autoplay muted loop id="oceanVideo">
<source src="ocean.mp4" type="video/mp4">
</video>

<img src="fish.png" class="fish fish1">
<img src="fish.png" class="fish fish2">
<img src="fish.png" class="fish fish3">

<!-- TITLE -->

<div class="hero">

<h1 class="main-title">
Counting Down To <br>
<span class="gradient-text">Your Smile 💖</span>
</h1>

<div id="countdown"></div>

</div>

<!-- ORBIT PHOTOS -->

<div class="orbit-container">

<div class="orbit">

<img src="photo1.jpg" onclick="showMemory('Our first memory ❤️')">
<img src="photo2.jpg" onclick="showMemory('You looked beautiful here 💖')">
<img src="photo3.jpg" onclick="showMemory('This day was special 🌸')">
<img src="photo4.jpg" onclick="showMemory('One of my favorite moments 💕')">
<img src="photo5.jpg" onclick="showMemory('A memory I will never forget ✨')">

</div>

</div>

<!-- PHOTO GALLERY -->

<div class="gallery">

<div class="card"><img src="photo6.jpg" onclick="showMemory('This was such a fun day 😍')"></div>
<div class="card"><img src="photo7.jpg" onclick="showMemory('One of our best photos ❤️')"></div>
<div class="card"><img src="photo8.jpg" onclick="showMemory('A moment I always remember 🌹')"></div>
<div class="card"><img src="photo9.jpg" onclick="showMemory('You were glowing here ✨')"></div>
<div class="card"><img src="photo10.jpg" onclick="showMemory('A beautiful memory 💕')"></div>

</div>

<!-- MEMORY POPUP -->

<div id="memoryPopup">

<div id="memoryText"></div>

<button onclick="closeMemory()">Close</button>

</div>

<!-- BIRTHDAY SCREEN -->

<div id="secondScreen">
🎉 HAPPY BIRTHDAY MY LOVE 🎉
</div>

<script>

/* COUNTDOWN */

const targetDate=new Date("March 25, 2026 00:00:00").getTime();

const timer=setInterval(function(){

const now=new Date().getTime();
const distance=targetDate-now;

const days=Math.floor(distance/(1000*60*60*24));
const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((distance%(1000*60*60))/(1000*60));
const seconds=Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
days+"d "+hours+"h "+minutes+"m "+seconds+"s";

if(distance<0){

clearInterval(timer);

document.querySelector(".hero").style.display="none";
document.querySelector(".orbit-container").style.display="none";
document.querySelector(".gallery").style.display="none";

document.getElementById("secondScreen").style.display="flex";

}

},1000);


/* MEMORY POPUP */

function showMemory(text){

document.getElementById("memoryText").innerText=text;

document.getElementById("memoryPopup").style.display="flex";

}

function closeMemory(){

document.getElementById("memoryPopup").style.display="none";

}

</script>

</body>
</html>
