<!DOCTYPE html>
<html>
<head>
  <title>Deep Ocean Surprise</title>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(to bottom, #02111b, #000814);
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    /* Ocean background */
    .ocean {
      position: fixed;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 20%, #033a4a, #000814 80%);
      z-index: -3;
    }

    /* Fish swimming */
    .fish {
      position: absolute;
      width: 120px;
      animation: swim 25s linear infinite;
      opacity: 0.8;
    }

    .fish2 {
      top: 60%;
      animation-delay: 10s;
      width: 90px;
    }

    @keyframes swim {
      from { left: -150px; }
      to { left: 110%; }
    }

    /* Countdown */
    .countdown {
      position: absolute;
      top: 40%;
      width: 100%;
      font-size: 40px;
      letter-spacing: 2px;
    }

    /* Surprise Section */
    .surprise {
      display: none;
      padding-top: 50px;
    }

    .photos img {
      width: 200px;
      margin: 10px;
      border-radius: 15px;
      box-shadow: 0 0 20px #00b4d8;
      transition: transform 0.5s;
    }

    .photos img:hover {
      transform: scale(1.1);
    }

  </style>
</head>

<body>

<div class="ocean"></div>

<!-- Fish GIFs -->
<img src="https://media.giphy.com/media/3o6ZtaO9BZHcOjmErm/giphy.gif" class="fish" style="top:30%;">
<img src="https://media.giphy.com/media/l3vR85PnGsBwu1PFK/giphy.gif" class="fish fish2">

<!-- Ocean Sound -->
<audio autoplay loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_9e5b3f28c7.mp3?filename=deep-ocean-ambient-110624.mp3" type="audio/mpeg">
</audio>

<!-- Countdown -->
<div class="countdown" id="countdown">
  Waiting for the special moment...
</div>

<!-- Surprise Section -->
<div class="surprise" id="surprise">
  <h1>💙 Our Beautiful Memories 💙</h1>
  <div class="photos">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
    <img src="photo4.jpg">
    <img src="photo5.jpg">
    <img src="photo6.jpg">
    <img src="photo7.jpg">
    <img src="photo8.jpg">
    <img src="photo9.jpg">
    <img src="photo10.jpg">
  </div>
</div>

<script>
  // Set your surprise date here
  var countDate = new Date("March 25, 2026 00:00:00").getTime();

  var x = setInterval(function() {
    var now = new Date().getTime();
    var distance = countDate - now;

    var days = Math.floor(distance / (1000 * 60 * 60 * 24));
    var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    var seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
      days + "d " + hours + "h "
      + minutes + "m " + seconds + "s ";

    if (distance < 0) {
      clearInterval(x);
      document.getElementById("countdown").style.display = "none";
      document.getElementById("surprise").style.display = "block";
    }
  }, 1000);
</script>

</body>
</html>
