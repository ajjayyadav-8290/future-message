<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counting Down</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f0f0f,#1a1a1a,#000);
overflow:hidden;
color:white;
}

/* floating lights */

.light{
position:absolute;
width:400px;
height:400px;
border-radius:50%;
filter:blur(120px);
opacity:0.5;
animation:float 10s infinite alternate;
}

.light1{
background:#ff2d55;
top:-100px;
left:-100px;
}

.light2{
background:#0a84ff;
bottom:-100px;
right:-100px;
}

@keyframes float{
from{transform:translateY(0)}
to{transform:translateY(80px)}
}

/* glass container */

.container{
text-align:center;
backdrop-filter:blur(20px);
background:rgba(255,255,255,0.05);
padding:60px 80px;
border-radius:30px;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 20px 80px rgba(0,0,0,0.6);
}

/* title */

.title{
font-size:clamp(30px,5vw,60px);
font-weight:800;
margin-bottom:30px;
}

/* countdown */

.countdown{
display:flex;
gap:30px;
justify-content:center;
}

.time-box{
display:flex;
flex-direction:column;
align-items:center;
}

.number{
font-size:clamp(40px,6vw,80px);
font-weight:900;
}

.label{
font-size:14px;
opacity:0.6;
margin-top:5px;
letter-spacing:1px;
}

/* message */

.message{
margin-top:25px;
font-size:18px;
opacity:0.8;
}

/* birthday screen */

#birthday{
display:none;
font-size:clamp(40px,7vw,80px);
font-weight:900;
text-align:center;
}

</style>
</head>

<body>

<div class="light light1"></div>
<div class="light light2"></div>

<div class="container" id="countContainer">

<div class="title">
Counting Down To Your Birthday 💖
</div>

<div class="countdown">

<div class="time-box">
<div class="number" id="days">0</div>
<div class="label">DAYS</div>
</div>

<div class="time-box">
<div class="number" id="hours">0</div>
<div class="label">HOURS</div>
</div>

<div class="time-box">
<div class="number" id="minutes">0</div>
<div class="label">MINUTES</div>
</div>

<div class="time-box">
<div class="number" id="seconds">0</div>
<div class="label">SECONDS</div>
</div>

</div>

<div class="message">
Something beautiful is coming...
</div>

</div>

<div id="birthday">
🎉 HAPPY BIRTHDAY MY LOVE 🎉
</div>

<script>

const targetDate=new Date("March 25, 2026 00:00:00").getTime();

const timer=setInterval(function(){

const now=new Date().getTime();
const distance=targetDate-now;

const days=Math.floor(distance/(1000*60*60*24));
const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((distance%(1000*60*60))/(1000*60));
const seconds=Math.floor((distance%(1000*60))/1000);

document.getElementById("days").innerHTML=days;
document.getElementById("hours").innerHTML=hours;
document.getElementById("minutes").innerHTML=minutes;
document.getElementById("seconds").innerHTML=seconds;

if(distance<0){

clearInterval(timer);

document.getElementById("countContainer").style.display="none";
document.getElementById("birthday").style.display="block";

}

},1000);

</script>

</body>
</html>
