<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>25 March Surprise</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Segoe UI;
color:white;
text-align:center;
}

/* Background Video */
.bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
filter:blur(50px) brightness(35%);
transform:scale(1.3);
z-index:-5;
}

/* TIMER (Less glow + Upper position) */
.timer-box{
position:absolute;
top:15%;
left:50%;
transform:translateX(-50%);
}

.countdown{
font-size:55px;
letter-spacing:4px;
font-weight:bold;
color:white;
text-shadow:
0 0 5px rgba(255,255,255,0.4),
0 0 10px rgba(0,200,255,0.4);
}

/* ROTATING CIRCLE */
.circle{
position:absolute;
top:55%;
left:50%;
transform:translate(-50%,-50%);
width:350px;
height:350px;
animation:rotate 25s linear infinite;
}

@keyframes rotate{
from{transform:translate(-50%,-50%) rotate(0deg);}
to{transform:translate(-50%,-50%) rotate(360deg);}
}

.circle img{
position:absolute;
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
border:2px solid rgba(255,255,255,0.6);
}

/* Position 10 images in circle */
.circle img:nth-child(1){top:0%; left:50%; transform:translate(-50%,-50%);}
.circle img:nth-child(2){top:15%; left:85%;}
.circle img:nth-child(3){top:50%; left:100%; transform:translate(-50%,-50%);}
.circle img:nth-child(4){top:85%; left:85%;}
.circle img:nth-child(5){top:100%; left:50%; transform:translate(-50%,-50%);}
.circle img:nth-child(6){top:85%; left:15%;}
.circle img:nth-child(7){top:50%; left:0%; transform:translate(-50%,-50%);}
.circle img:nth-child(8){top:15%; left:15%;}
.circle img:nth-child(9){top:30%; left:95%;}
.circle img:nth-child(10){top:70%; left:5%;}

/* Center Message */
.center-message{
position:absolute;
top:55%;
left:50%;
transform:translate(-50%,-50%);
font-size:28px;
font-weight:bold;
text-shadow:0 0 10px rgba(255,255,255,0.6);
z-index:5;
}

.subtitle{
margin-top:10px;
font-size:18px;
opacity:0.7;
}
</style>
</head>

<body>

<video class="bg-video" autoplay muted loop playsinline>
<source src="bg.mp4" type="video/mp4">
</video>

<!-- TIMER -->
<div class="timer-box">
<div class="countdown" id="countdown"></div>
<div class="subtitle">The world changed on 25th March...</div>
</div>

<!-- ROTATING PHOTOS -->
<div class="circle">
<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
<img src="photo5.jpg">
<img src="photo6.jpg">
<img src="photo7.jpg">
<img src="photo8.jpg">
<img src="photo9.jpg">
<img src="photo10.jpg">
</div>

<!-- CENTER SURPRISE MESSAGE -->
<div class="center-message">
Something Beautiful is Coming 💙
</div>

<script>
const countdown=document.getElementById("countdown");
const targetDate=new Date("March 25, 2026 00:00:00").getTime();

setInterval(function(){
const now=new Date().getTime();
const distance=targetDate-now;

let days=Math.floor(distance/(1000*60*60*24));
let hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
let minutes=Math.floor((distance%(1000*60*60))/(1000*60));
let seconds=Math.floor((distance%(1000*60))/1000);

countdown.innerHTML=
days+"D : "+hours+"H : "+minutes+"M : "+seconds+"S";
},1000);
</script>

</body>
</html>
